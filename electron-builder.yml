appId: com.acme.agentstudio
productName: Agent Studio
asar: true
npmRebuild: false

directories:
  output: release

files:
  - dist/**/*
  - dist-electron/**/*
  - package.json

linux:
  target:
    - AppImage
  category: Development
  syncDesktopName: true

win:
  target:
    - nsis

portable:
  artifactName: ${productName}-${version}-portable.${ext}

mac:
  target:
    - dmg
