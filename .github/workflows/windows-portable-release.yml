name: Build Windows Portable Release

on:
  release:
    types:
      - published
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version to build, for example v1.2.3 or 1.2.3'
        required: true

permissions:
  contents: write

jobs:
  build-windows-portable:
    name: Build Windows portable executable
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set app version from release version
        shell: pwsh
        run: |
          $releaseTag = switch ('${{ github.event_name }}') {
            'release' { '${{ github.event.release.tag_name }}' }
            'push' { '${{ github.ref_name }}' }
            default { '${{ inputs.version }}' }
          }

          if ([string]::IsNullOrWhiteSpace($releaseTag)) {
            throw 'A release tag or workflow_dispatch version is required.'
          }

          $version = $releaseTag -replace '^v', ''

          if ($version -notmatch '^\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$') {
            throw "Release version '$releaseTag' is not valid semver. Use versions like v1.2.3, 1.2.3, or v1.2.3-beta.1."
          }

          "RELEASE_TAG=$releaseTag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          npm version $version --no-git-tag-version --allow-same-version

      - name: Build renderer and Electron main process
        run: npm run build

      - name: Build Windows portable executable
        run: npx electron-builder --win portable --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload portable executable to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: release/*.exe
          fail_on_unmatched_files: true
